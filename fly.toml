# =============================================================================
# Hermes Alpha Hunter — Fly.io Configuration
# Persistent Telegram gateway for autonomous security analysis
# =============================================================================

app = "hermes-alpha-hunter"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

# Overseer API on internal port 8080 (Fly private network only)
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 8080
    handlers = ["http"]

[[vm]]
  size = "shared-cpu-2x"
  memory = 2048              # 2 GB RAM

[env]
  PYTHONUNBUFFERED = "1"
  HERMES_HOME = "/root/.hermes"
  HERMES_YOLO_MODE = "1"

# Restart on failure — the gateway should always be running
[restart]
  policy = "always"
  max_retries = 10
