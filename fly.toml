# =============================================================================
# Hermes Alpha Hunter — Fly.io Configuration
# Persistent Telegram gateway for autonomous security analysis
# =============================================================================

app = "hermes-alpha-hunter"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

# Overseer API — bearer-token protected HTTP endpoint
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true

[[vm]]
  size = "shared-cpu-2x"
  memory = 2048

[env]
  PYTHONUNBUFFERED = "1"
  HERMES_HOME = "/root/.hermes"
  HERMES_YOLO_MODE = "1"
