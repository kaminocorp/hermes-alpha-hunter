# =============================================================================
# Hermes Alpha Hunter — Fly.io Configuration
# Persistent Telegram gateway for autonomous security analysis
# =============================================================================

app = "hermes-alpha-hunter"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

# Overseer API — bearer-token protected HTTP endpoint
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000

  [[http_service.headers]]
    paths = ["/api/*", "/health"]
    [http_service.headers.values]
      Access-Control-Allow-Origin = "*"
      Access-Control-Allow-Methods = "GET, POST, DELETE, OPTIONS"
      Access-Control-Allow-Headers = "Content-Type, Authorization"

[[vm]]
  size = "shared-cpu-2x"
  memory = 2048

[env]
  PYTHONUNBUFFERED = "1"
  HERMES_HOME = "/root/.hermes"
  HERMES_YOLO_MODE = "1"
