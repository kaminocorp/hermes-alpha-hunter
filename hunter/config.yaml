# =============================================================================
# Hermes Alpha Hunter — Agent Configuration
# Persistent gateway mode via Telegram
# =============================================================================

model:
  default: "anthropic/claude-sonnet-4-20250514"
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"

compression:
  enabled: true
  threshold: 0.85
  summary_model: "google/gemini-3-flash-preview"

memory:
  memory_enabled: true
  user_profile_enabled: false
  memory_char_limit: 2200
  user_char_limit: 0
  nudge_interval: 15
  flush_min_turns: 6

session_reset:
  mode: idle
  idle_minutes: 4320  # 72 hours — long missions need long context

skills:
  creation_nudge_interval: 0  # Don't nudge for skill creation

agent:
  max_turns: 200
  verbose: false
  reasoning_effort: "high"

terminal:
  backend: "local"
  cwd: "/workspace"
  timeout: 300
  lifetime_seconds: 600
  container_cpu: 2
  container_memory: 2048
  container_disk: 51200

browser:
  inactivity_timeout: 120

platform_toolsets:
  telegram: [terminal, file, web, browser, vision, skills, todo, memory, session_search, moa]

toolsets:
  - all

display:
  compact: true
  tool_progress: all
  background_process_notifications: all
  show_reasoning: false

code_execution:
  timeout: 300
  max_tool_calls: 50

delegation:
  max_iterations: 75
  default_toolsets: ["terminal", "file", "web"]
